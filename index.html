<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT.DIGITAL Website Auditor</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">

<div class="absolute inset-0 bg-gradient-to-br from-purple-900/20 via-black to-cyan-900/20"></div>

<div class="relative z-10 flex items-center justify-center min-h-screen px-4">

<div class="max-w-2xl w-full">

<h1 class="text-6xl font-bold mb-4 text-center">
AT.DIGITAL
</h1>

<p class="text-zinc-400 text-center mb-10">
Website Security & SEO Auditor
</p>
<p class="text-center text-zinc-500 mb-8">
Analyze website security, structure and optimization readiness instantly.
</p>
<div class="bg-zinc-900/70 backdrop-blur-xl border border-zinc-800 rounded-3xl p-8">

<input
id="urlInput"
type="text"
placeholder="https://example.com"
class="w-full bg-black border border-zinc-700 rounded-xl p-4 mb-4"
/>

<button
onclick="auditSite()"
class="w-full py-4 rounded-xl font-bold bg-white text-black hover:scale-105 transition"
>
Run Audit
</button>

<div id="results" class="mt-6 hidden"></div>

<div class="mt-8 border-t border-zinc-800 pt-6">

<p class="text-zinc-400 text-sm">
Arnav Tyagi
</p>

<p class="text-zinc-500 text-sm">
spiderstark12@gmail.com
</p>

<a
href="https://digitalheroesco.com"
target="_blank"
class="mt-4 inline-block px-4 py-2 rounded-xl border border-white"
>
Built for Digital Heroes
</a>

</div>

</div>

</div>

</div>
<script src="script.js"></script>
</body>
</html>
